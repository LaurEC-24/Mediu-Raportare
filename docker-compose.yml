version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: mediu-raportare-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: mediu_raportare_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediu-raportare-backend
    environment:
      DB_HOST: postgres-db
      DB_USER: postgres
      DB_PASS: postgrespassword
      DB_NAME: mediu_raportare_db
      JWT_SECRET: supersecretmediu123
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres-db
    restart: unless-stopped
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediu-raportare-frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
